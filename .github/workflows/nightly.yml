name: Nightly Job Search

on:
  schedule:
    # 3:30 PM UTC = 9:00 PM IST — runs every day
    - cron: '30 15 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-and-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to push seen_urls.json back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly job search
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python nightly.py

      - name: Upload TONIGHT.md as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tonight-battle-plan
          path: TONIGHT.md
          retention-days: 7

      - name: Commit seen_urls.json back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_urls.json
          git diff --cached --quiet || git commit -m "chore: update seen_urls after nightly run [skip ci]"
          git pull --rebase origin main && git push
